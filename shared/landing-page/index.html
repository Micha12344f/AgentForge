    <!-- UTM Attribution Capture (localStorage -> Supabase at signup) -->
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var utmKeys = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
        var hasUtm = false;
        var utmData = {};
        var sanitize = function(v) { return v.replace(/[{}]/g, ''); };
        utmKeys.forEach(function(key) {
          var val = params.get(key);
          if (val) { utmData[key] = sanitize(val); hasUtm = true; }
        });
        // Organic / referral fallback when no explicit UTM params
        if (!hasUtm && document.referrer) {
          try {
            var refHost = new URL(document.referrer).hostname.toLowerCase();
            if (refHost !== window.location.hostname) {
              var engines = {google:1,bing:1,duckduckgo:1,yahoo:1,baidu:1,yandex:1};
              var matched = Object.keys(engines).find(function(e) { return refHost.indexOf(e) !== -1; });
              if (matched) {
                utmData.utm_source = matched;
                utmData.utm_medium = 'organic';
              } else {
                utmData.utm_source = refHost;
                utmData.utm_medium = 'referral';
              }
              hasUtm = true;
            }
          } catch(e) {}
        }
        if (hasUtm) {
          utmData.landed_at = new Date().toISOString();
          // NOTE: key must be 'landing_url' to match utm.ts legacy parser
          utmData.landing_url = window.location.pathname.replace(/\}+$/, '');
          localStorage.setItem('hedge_utm', JSON.stringify(utmData));
        }
      })();
    </script>

          user_agent: navigator.userAgent ? navigator.userAgent.substring(0, 512) : null
        };
