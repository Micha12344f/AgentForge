    <script>
      (function() {
        var SESSION_KEY = "hedge_utm_params";
        var LOCAL_KEY = "hedge_utm_full";
        var LEGACY_KEY = "hedge_utm";
        var params = new URLSearchParams(window.location.search);
        var sanitize = function(value) { return value.replace(/[{}]/g, ""); };
        var currentPath = window.location.pathname.replace(/\/+$/, "") || "/x";
        var data = {
          utm_source: sanitize(params.get("utm_source") || "twitter"),
          utm_medium: sanitize(params.get("utm_medium") || "social"),
          utm_campaign: sanitize(params.get("utm_campaign") || "x-pinned-post"),
          utm_content: sanitize(params.get("utm_content") || "pinned-cta"),
          landing_url: currentPath,
          landed_at: new Date().toISOString(),
        };

        var utmTerm = params.get("utm_term");
        if (utmTerm) data.utm_term = sanitize(utmTerm);

        var ref = params.get("ref");
        if (ref) data.ref = sanitize(ref);

        var json = JSON.stringify(data);

        try {
          if (!sessionStorage.getItem(SESSION_KEY)) {
            sessionStorage.setItem(SESSION_KEY, json);
          }
        } catch (error) {}

        try {
          if (!localStorage.getItem(LOCAL_KEY)) {
            localStorage.setItem(LOCAL_KEY, json);
          }
          localStorage.setItem(LEGACY_KEY, json);
        } catch (error) {}

        var destination = new URL("/", window.location.origin);
        if (window.location.hash) {
          destination.hash = window.location.hash;
        }
        window.location.replace(destination.toString());
      })();
    </script>
